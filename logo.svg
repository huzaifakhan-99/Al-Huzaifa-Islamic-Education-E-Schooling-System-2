<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160">
  <!-- background -->
  <rect x="0" y="0" width="160" height="160" rx="34" fill="#0B1F1A"/>

  <!-- gold ring -->
  <circle cx="80" cy="72" r="62" fill="none" stroke="#C8932B" stroke-width="2.5" opacity="0.55"/>

  <!-- 8-point star: two overlapping squares -->
  <g transform="translate(80,72)" fill="none" stroke="#E6C878" stroke-width="3.2" stroke-linejoin="round">
    <rect x="-40" y="-40" width="80" height="80" rx="5"/>
    <rect x="-40" y="-40" width="80" height="80" rx="5" transform="rotate(45)"/>
  </g>

  <!-- CRESCENT (same method as PNG: big gold circle minus offset dark circle) -->
  <g transform="translate(74,72)">
    <circle cx="0" cy="0" r="24" fill="#E6C878"/>
    <circle cx="10" cy="-2" r="20" fill="#0B1F1A"/>
  </g>

  <!-- 5-point STAR beside crescent -->
  <g transform="translate(96,74)">
    <polygon points="0,-11 2.6,-3.4 10.5,-3.4 4,1.3 6.5,9 0,4.3 -6.5,9 -4,1.3 -10.5,-3.4 -2.6,-3.4" fill="#E6C878"/>
  </g>

  <!-- open book at bottom -->
  <g transform="translate(80,120)">
    <path d="M-34 4 C -22 -4, -8 -4, 0 2 C 8 -4, 22 -4, 34 4 L 34 14 C 22 6, 8 6, 0 12 C -8 6, -22 6, -34 14 Z" fill="#C8932B"/>
    <line x1="0" y1="2" x2="0" y2="12" stroke="#0B1F1A" stroke-width="1.5"/>
  </g>
</svg>
